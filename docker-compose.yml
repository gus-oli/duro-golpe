services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: duro_golpe
      POSTGRES_USER: duro_golpe
      POSTGRES_PASSWORD: duro_golpe_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duro_golpe"]
      interval: 5s
      timeout: 5s
      retries: 10

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
